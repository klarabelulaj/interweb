<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt | Interweb</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/about.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body>
    <div id="header"></div>

    <section class="contact-hero">
      <div class="hero-bg-circle c1"></div>
      <div class="hero-bg-circle c2"></div>
      <div class="hero-grid-lines"></div>

      <div class="container">
        <h1>Na Kontaktoni</h1>
      </div>
    </section>

    <div class="contact-content">
      <div class="kontakt-form">
        <form id="contact-form">
          <label for="fname">Emri</label>
          <input
            type="text"
            id="fname"
            name="firstname"
            placeholder="emri.."
            required
          />

          <label for="lname">Mbiemri</label>
          <input
            type="text"
            id="lname"
            name="lastname"
            placeholder="mbiemri.."
            required
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="email.."
            required
          />

          <label for="subject"> Mesazhi</label>
          <textarea
            id="subject"
            name="subject"
            placeholder="mesazhi.."
            style="height: 200px"
            required
          ></textarea>

          <input type="submit" value="Submit" id="submit-btn" />
        </form>
      </div>
      <div class="maps-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1498.1316630395777!2d19.815308328714384!3d41.32488699558057!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13503104f44d06a7%3A0xa8075cee7146a666!2sRruga%20Reshit%20%C3%87ollaku%2C%20Tiran%C3%AB%2C%20Albania!5e0!3m2!1sen!2s!4v1780745107296!5m2!1sen!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
          width="100%"
          height="100%"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        >
        </iframe>
      </div>
    </div>
    <div id="footer"></div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        emailjs.init("4POwcJb_7iBBJvNnQ");

        document
          .getElementById("contact-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();

            const btn = document.getElementById("submit-btn");
            btn.value = "Duke dërguar...";
            btn.disabled = true;

            emailjs
              .sendForm("service_mlpiuj4", "template_8mxht2o", this)
              .then(() => {
                btn.value = "U dërgua!";
                btn.style.background = "#16a34a";
                this.reset();
              })
              .catch((err) => {
                btn.value = "Gabim! Provo përsëri.";
                btn.style.background = "#dc2626";
                btn.disabled = false;
                console.error(err);
              });
          });
      });
    </script>
  </body>
</html>
